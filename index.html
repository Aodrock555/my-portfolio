<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9ec4,#ffc8dd,#cdb4db);

    height:170px;
    object-fit:cover;
    border-radius:50%;

}

hr{

    margin-top:20px;
    background:#ff1493;
    border:none;
    padding:12px 30px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e60073;
    transform:scale(1.05);
}

button a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
